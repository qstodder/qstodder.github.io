<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
(function () {
    const DESKTOP_PAGE = "book-list.html";
    const MOBILE_PAGE  = "book-list-mobile.html";
    const BREAKPOINT   = 768;

    function isPortrait() {
        return window.matchMedia("(orientation: portrait)").matches;
    }

    function onMobileLayout() {
        return window.innerWidth <= BREAKPOINT && isPortrait();
    }

    function isMobilePage()  {
        return window.location.pathname.includes("book-list-mobile");
    }

    function routePage()  {
        const shouldUseMobile = onMobileLayout();
        const currentlyMobile = isMobilePage();

        if (shouldUseMobile && !currentlyMobile)  {
            window.location.replace(MOBILE_PAGE);
            return;
        }

        if (!shouldUseMobile && currentlyMobile)  {
            window.location.replace(DESKTOP_PAGE);
            return;
        }
    }

    routePage();

    let resizeTimer;
    window.addEventListener("resize", function ()  {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(routePage, 150);
    });

    window.addEventListener("orientationchange", routePage);
})();
</script>

body {

header {

}

#home-icon {
    position: absolute;
    top: 0;
    right: 0;
    width: 3em;
    height: auto;
}

#home-icon img {
    width: 100%;
    height: 100%;
    cursor: pointer;
    transition: transform 0.2s ease;
}

#home-icon img:hover {
    transform: scale(1.1);
}

header h1 {
    margin:1rem;
    font-size:2rem;
}

.wrap {
    max-width:1200px;
    margin:auto;
    padding-bottom:80px;
}

/* =========================
   Year Sign
========================= */

.year-wrap {
    height:135px;
    background:#8aa9b3ff;
    display:flex;
    align-items:center;
    justify-content:center;
}

.year-sign {
    position:relative;
    transform:
        translateY(var(--y))
        rotate(var(--rot));
    filter:drop-shadow(0 8px 10px rgba(0,0,0,.35));
}

.year-sign img {
    height: 95px;   /* or whatever your baseline is */
    width: auto;     /* important: prevents distortion */
    display: block;
}

.year-sign span {
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    transform: translateY(15px);
    font-size:2rem;
    font-weight:bold;
    color:#48392cff;
    letter-spacing:.08em;
    text-shadow:0 2px 4px rgba(0,0,0,.55);
}

.year-sign.favorites-sign img {
    width: 300px; /* pick whatever feels right */
}

/* =========================
   Shelf
========================= */

.shelf {
    height:260px;
    background:center/cover no-repeat url('./img/bookshelf.svg');
    display:flex;
    align-items:flex-end;
    justify-content:center;
    gap:18px;
    padding:0 20px 34px;
}

.book {
    position:relative;
    width:130px;
    bottom:67px;
    text-align:center;
}

.book::before {
    content:'';
    position:absolute;
    left:10px;
    right:10px;
    top:8px;
    bottom:20px;
    background:rgba(0,0,0,.35);
    filter:blur(8px);
    transform:translate(8px,10px);
    border-radius:6px;
}

.book img {
    position:relative;
    width:relative;
    height:180px;
    object-fit:cover;
    border:1px solid rgba(0,0,0,.35);
    box-shadow:0 0px 20px 5px rgba(0,0,0,.45);
    transition:.25s;
    transform:
        scaleX(var(--sx))
        scaleY(var(--sy));
}

.book:hover img {
    transform:
        translateY(-8px)
        scaleX(var(--sx))
        scaleY(var(--sy))
        scale(1.03);
}

.title-on-book {
    position:absolute;
    top:12px;
    left:10px;
    right:10px;
    z-index:2;
    color:#f8f5e6;
    font-size:.72rem;
    line-height:1.15;
    font-weight:bold;
    text-align:center;
    text-shadow:0 1px 2px rgba(0,0,0,.65);
}

/* =========================
   Responsive
========================= */

@media (max-width:900px) {
    .shelf {
        gap:12px;
        height:240px;
    }

    .book {
        width:90px;
    }

    .book img {
        width:82px;
        height:128px;
    }
}

@media (max-width:640px) {

    .year-sign img {
        width:190px;
    }

    .year-sign span {
        font-size:1.85rem;
    }

    .shelf {
        gap:8px;
        height:220px;
        flex-wrap:wrap;
        align-content:flex-end;
    }

    .book {
        width:74px;
    }

    .book img {
        width:66px;
        height:104px;
    }

    .title-on-book {
        font-size:.62rem;
        left:6px;
        right:6px;
        top:8px;
    }
}
</style>
